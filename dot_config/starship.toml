[jobs]

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
show_notifications = true
notification_timeout = 7000

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

[nodejs]
format = "[$symbol($version )]($style)"
version_format = "$major"
