<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="pattern">
    <edit name="rgba" mode="assign_replace" binding="strong">
      <int>2</int>
    </edit>
  </match>
  <match target="font">
    <edit name="rgba" mode="assign_replace" binding="strong">
      <int>2</int>
    </edit>
  </match>
</fontconfig>
